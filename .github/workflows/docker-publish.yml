name: Docker
on:
  push:
    branches: [ "main" ]
    tags: [ "v**" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 14 * * *'
env:
  SHOULD_PUSH: ${{ github.event_name != 'pull_request' && (github.ref_type == 'tag' || github.ref == 'refs/heads/main') }}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        app:
          - dapa_daemon
          - dapa_miner
          - dapa_wallet
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: dapa
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Retrieve version from Cargo.toml
        run: |
          VERSION=`awk -F ' = ' '$1 ~ /version/ { gsub(/[\\"]/, "", $2); printf("%s",$2) }' ${{ matrix.app }}/Cargo.toml`
          echo "DAPA_VERSION=${VERSION}" >> "$GITHUB_ENV"
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dapa/${{ matrix.app }}
          labels: |
            org.opencontainers.image.title=DAPA ${{ matrix.app }}
          tags: |
            type=schedule,pattern=${{ env.DAPA_VERSION }}-nightly-{{date 'YYYYMMDD'}}
            type=semver,pattern={{version}},event=tag
            type=ref,event=pr
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ env.SHOULD_PUSH }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: ${{ env.SHOULD_PUSH && 'type=gha,mode=max' || '' }}
          build-args: |
            app=${{ matrix.app }}
            commit_hash=${{ github.sha }}
          platforms: ${{ env.SHOULD_PUSH && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
